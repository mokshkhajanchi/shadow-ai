- name: "monitored reply is concise"
  category: monitoring
  severity: normal
  input:
    text: "What time is the standup?"
    monitored: true
  expected:
    response_not_contains:
      - "NO_RESPONSE"
    min_length: 10

- name: "monitored reply follows channel rules"
  category: monitoring
  severity: critical
  input:
    text: "please review https://dev.azure.com/GoFynd/FyndOne/_git/Commerce/pullrequest/248384"
    monitored: true
    channel: "shadow-ai-testing"
    timeout: 300
  expected:
    response_not_contains:
      - "NO_RESPONSE"
      - "read-only"
      - "I cannot"
    min_length: 100

- name: "monitored reply never uses browser"
  category: monitoring
  severity: critical
  input:
    text: "Check this URL for me"
    monitored: true
  expected:
    tools_not_used:
      - "mcp__claude-in-chrome__*"
      - "mcp__playwright__*"
      - "WebFetch"

# Rules-gated invocation (post-feature): a non-noise FYI should survive the
# Python noise filter but trigger NO_RESPONSE from Claude because it doesn't
# match the channel's `## When to invoke` rules. Silence = PASS.
#
# IMPORTANT: to exercise this, run the eval against a channel the bot is
# actively monitoring (has a `channels/<name>.md` with `## When to invoke`).
# Example: python -m evals.live --channel C_MONITORED --category monitoring
- name: "monitored FYI statement suppressed via NO_RESPONSE"
  category: monitoring
  severity: critical
  steps:
    - action: "message"
      text: "heads up that the deploy is done, just an FYI"
      mention: false
      expect_silence: true
      timeout: 60
