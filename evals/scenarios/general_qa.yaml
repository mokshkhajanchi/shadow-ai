- name: "answers codebase questions"
  category: general_qa
  severity: normal
  input:
    text: "What is shadow.ai? Tell me about this bot."
  expected:
    response_contains:
      - "Slack"
    min_length: 50
    response_not_contains:
      - "I don't know"

- name: "uses slack formatting"
  category: general_qa
  severity: normal
  input:
    text: "List the main features of this bot"
  expected:
    min_length: 100
    response_not_contains:
      - "# "

- name: "respects model prefix"
  category: general_qa
  severity: normal
  input:
    text: "opus: what MCP tools do you have available?"
  expected:
    min_length: 100

- name: "direct answer no preamble"
  category: general_qa
  severity: normal
  input:
    text: "How many MCP servers are configured?"
  expected:
    response_not_contains:
      - "I'd be happy to help"
      - "Sure, I can"
      - "Of course!"
    min_length: 20
