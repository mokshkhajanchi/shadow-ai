# Verify Claude does NOT save notes when the user asks to DO something.
# These are action requests that should be executed, not saved to memory.

- name: "revert commit is action not save"
  category: no_over_save
  severity: critical
  input:
    text: "Check the recent git commits in the current repo and show me the last 5 commits."
  expected:
    response_not_contains:
      - "Memory saved"
      - "saved to memory"
      - "persisted"
      - "noted for future"
      - "Noted:"
    min_length: 20

- name: "share PRs is action not save"
  category: no_over_save
  severity: critical
  input:
    text: "List the open PRs in the Commerce repo and include their linked Jira tickets."
  expected:
    response_not_contains:
      - "Memory saved"
      - "saved to memory"
      - "persisted"
      - "Noted:"
    min_length: 20

- name: "create branch is action not save"
  category: no_over_save
  severity: critical
  input:
    text: "Create a feature branch from master for FPP-33431 and push it to the remote repo."
  expected:
    response_not_contains:
      - "Memory saved"
      - "saved to memory"
      - "persisted"
      - "memory check"
      - "already saved"
      - "no updates needed"
    min_length: 20

- name: "explicit remember still works"
  category: no_over_save
  severity: critical
  input:
    text: "The staging environment URL is staging.example.internal. Remember this."
  expected:
    min_length: 10
    response_not_contains:
      - "I don't know"
      - "error"
