- name: "pr review has structured format"
  category: pr_review
  severity: critical
  input:
    text: "please review: https://dev.azure.com/GoFynd/FyndOne/_git/Commerce/pullrequest/248384"
    monitored: true
    channel: "shadow-ai-testing"
  expected:
    response_contains:
      - "PR"
    response_not_contains:
      - "NO_RESPONSE"
      - "I cannot"
      - "read-only mode"
    min_length: 200

- name: "pr review uses ado mcp tools"
  category: pr_review
  severity: normal
  input:
    text: "review this PR https://dev.azure.com/GoFynd/FyndOne/_git/Commerce/pullrequest/248384"
    monitored: true
  expected:
    tools_used:
      - "repo_get_pull_request_by_id"
    tools_not_used:
      - "mcp__claude-in-chrome__*"
      - "WebFetch"

- name: "pr review clones repo for diff"
  category: pr_review
  severity: normal
  input:
    text: "please review PR 248384"
    monitored: true
  expected:
    tools_used:
      - "Bash"
    response_not_contains:
      - "cannot fetch"
      - "don't have a direct way"
