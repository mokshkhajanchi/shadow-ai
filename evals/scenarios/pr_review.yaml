- name: "pr review has structured format"
  category: pr_review
  severity: critical
  input:
    text: "Review this PR now. Fetch the details, clone the repo, get the diff, and give me a structured review. Even if it's merged, review the code changes. PR: https://dev.azure.com/GoFynd/FyndOne/_git/Commerce/pullrequest/248384"
    monitored: true
    channel: "shadow-ai-testing"
  expected:
    response_contains:
      - "PR"
    response_not_contains:
      - "NO_RESPONSE"
      - "I cannot"
      - "read-only mode"
      - "already reviewed"
      - "already merged"
      - "won't review"
    min_length: 200

- name: "pr review uses ado mcp tools"
  category: pr_review
  severity: normal
  input:
    text: "I need a code review of PR #248384 in the Commerce repo. Use the Azure DevOps tools to fetch the PR details. https://dev.azure.com/GoFynd/FyndOne/_git/Commerce/pullrequest/248384"
    monitored: true
  expected:
    tools_used:
      - "repo_get_pull_request_by_id"
    tools_not_used:
      - "mcp__claude-in-chrome__*"
      - "WebFetch"
  verify:
    tool_sequence:
      - "repo_get_pull_request_by_id"

- name: "pr review clones repo for diff"
  category: pr_review
  severity: normal
  input:
    text: "Clone the Commerce repo and show me the actual git diff for this PR. I want to see the code changes, not just metadata. https://dev.azure.com/GoFynd/FyndOne/_git/Commerce/pullrequest/248384"
    monitored: true
  expected:
    tools_used:
      - "Bash"
    response_not_contains:
      - "cannot fetch"
      - "don't have a direct way"
      - "already reviewed"
      - "already merged"
  verify:
    tool_sequence:
      - "Bash"
