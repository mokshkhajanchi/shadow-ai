- name: "learn command saves note"
  category: note_taking
  severity: critical
  input:
    text: "learn"
  expected:
    response_not_contains:
      - "error"
      - "failed"
  verify:
    file_created:
      dir: "knowledge/notes"
      pattern: "*.md"
    log_contains:
      - "\\[AUTO-SAVE\\]|brain|white_check_mark"

- name: "remember this triggers note"
  category: note_taking
  severity: normal
  input:
    text: "remember this conversation"
  expected:
    response_not_contains:
      - "error"
  verify:
    file_created:
      dir: "knowledge/notes"
      pattern: "*.md"

- name: "take note triggers note"
  category: note_taking
  severity: normal
  input:
    text: "take a note"
  expected:
    response_not_contains:
      - "error"

- name: "normal question does not trigger note"
  category: note_taking
  severity: critical
  input:
    text: "remember what the API endpoint returns?"
  expected:
    response_not_contains:
      - "Saved to"
      - "knowledge/notes/"
    min_length: 20
