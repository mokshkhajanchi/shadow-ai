- name: "learn command saves note"
  category: note_taking
  severity: critical
  input:
    text: "Tell me about shadow.ai, then learn from this conversation"
  expected:
    response_not_contains:
      - "error"
      - "failed"
    min_length: 20

- name: "remember this triggers note"
  category: note_taking
  severity: normal
  input:
    text: "The API rate limit is 100 requests per minute. Remember this."
  expected:
    response_not_contains:
      - "error"
    min_length: 5

- name: "take note triggers note"
  category: note_taking
  severity: normal
  input:
    text: "Our deployment process uses tag-based releases. Take note."
  expected:
    response_not_contains:
      - "error"

- name: "normal question does not trigger note"
  category: note_taking
  severity: critical
  input:
    text: "remember what the API endpoint returns?"
  expected:
    response_not_contains:
      - "Saved to"
      - "knowledge/notes/"
    min_length: 20
