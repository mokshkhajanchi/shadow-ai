# Note-taking is now handled by Claude (not keyword detection).
# Claude uses the Write tool to save notes when user asks to remember something.

- name: "learn command triggers claude response"
  category: note_taking
  severity: normal
  input:
    text: "The standup is at 10 AM every day. Remember this."
  expected:
    response_not_contains:
      - "error"
      - "failed"
    min_length: 10

- name: "remember with task does both"
  category: note_taking
  severity: critical
  input:
    text: "We always create feature branches from master. Remember this. Also, what branches exist in the Commerce repo?"
  expected:
    response_not_contains:
      - "error"
    min_length: 50

- name: "normal question not treated as note"
  category: note_taking
  severity: critical
  input:
    text: "remember what the API endpoint returns?"
  expected:
    response_not_contains:
      - "Saved to"
      - "Noted:"
    min_length: 20
